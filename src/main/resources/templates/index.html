<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Home Page | EMS</title>
</head>
<body>
<div align="center"><h1>Employees List</h1>
<h3><a th:href="@{/showNewEmployeeForms}">Add Employee</a></h3>
<table border="1">
	<thead>
		<tr>
			<th>First Name</th>
			<th>Last Name</th>
			<th>Email</th>
			<th>Action</th>
		</tr>
	</thead>
	<tbody>
		<tr th:each="employee : ${listEmployees}">
			<td th:text="${employee.firstName}"></td>
			<td th:text="${employee.lastName}"></td>
			<td th:text="${employee.email}"></td>
			<td> <a th:href="@{/showFormForUpdate/{id}(id=${employee.id})}">Update</a></td>
			<td><a th:href="@{/deleteEmployee/{id}(id=${employee.id})}">Delete</a></td>
		</tr>
	</tbody>
</table>
</div>
</body>
</html>
