<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
|<title>Update Employee | EMS</title>
</head>

<body>
<div>
<h1>Update Employee | EMS</h1>

<form action="#" th:action="@{/saveEmployee}" th:object="${employee}" method="POST">
<input type="hidden" th:field="*{id}" />
<input type="text" th:field="*{firstName}"><br>
<input type="text" th:field="*{lastName}"><br>
<input type="text" th:field="*{email}"><br>

<button type="submit">Update Employee </button>
</form>
</div>
</body>
</html>
