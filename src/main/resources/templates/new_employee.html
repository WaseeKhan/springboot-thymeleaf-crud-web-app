<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
|<title>Add Employee | EMS</title>
</head>

<body>
<div>
<h1>Add Employee | EMS</h1>

<form th:action="@{/saveEmployee}" th:object="${employee}" method="POST">
<input type="text" th:field="*{firstName}" placeholder="First name"><br>
<input type="text" th:field="*{lastName}" placeholder="Last name"><br>
<input type="text" th:field="*{email}" placeholder="Email"><br>

<button type="submit">Save Employee </button>
</form>
</div>
</body>
</html>
